server {
    listen __PORT__ default_server;
    listen [::]:__PORT__ default_server;
    server_name _;

    root /var/www/moonserve;

    # Current moon phase image
    location = /moon.png {
        expires 30m;
        add_header Access-Control-Allow-Origin "*";
    }

    # Minimal viewer page
    location = / {
        return 200 '<!DOCTYPE html><html><body style="background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0"><img src="/moon.png" style="max-width:100vh;max-height:100vh"></body></html>';
        default_type text/html;
    }

    location / {
        return 404;
    }
}
